<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Price Prediction</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
padding:30px;
color:white;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
}

.back{
display:inline-block;
margin-bottom:20px;
color:white;
text-decoration:none;
font-weight:bold;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
}

.help-box{
background:rgba(255,255,255,.08);
padding:15px;
border-radius:15px;
margin-bottom:25px;
color:#cbd5e1;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.field{
display:flex;
flex-direction:column;
}

label{
margin-bottom:6px;
font-weight:600;
}

input,select{
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
}

button{
width:100%;
padding:15px;
margin-top:25px;
border:none;
border-radius:12px;
background:#38bdf8;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
padding:18px;
border-radius:15px;
background:rgba(255,255,255,.1);
text-align:center;
font-size:20px;
}

@media(max-width:768px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<a href="/" class="back">⬅ Back Home</a>

<h1>💰 Diamond Price Prediction</h1>

<p class="subtitle">
Estimate diamond value using Machine Learning
</p>

<div class="help-box">
💡 Example Values:
Carat = 1.25,
Depth = 61.5,
Table = 57,
X = 6.9,
Y = 6.8,
Z = 4.2
</div>

<div class="grid">

<div class="field">
<label>Diamond Cut</label>
<select id="cut">
<option>Ideal</option>
<option>Premium</option>
<option>Very Good</option>
<option>Good</option>
<option>Fair</option>
</select>
</div>

<div class="field">
<label>Diamond Color</label>
<select id="color">
<option>D</option>
<option>E</option>
<option>F</option>
<option>G</option>
<option>H</option>
<option>I</option>
<option>J</option>
</select>
</div>

<div class="field">
<label>Diamond Clarity</label>
<select id="clarity">
<option>IF</option>
<option>VVS1</option>
<option>VVS2</option>
<option>VS1</option>
<option>VS2</option>
<option>SI1</option>
<option>SI2</option>
<option>I1</option>
</select>
</div>

<div class="field">
<label>Carat Weight</label>
<input type="number" step="0.01" id="carat" placeholder="Example: 1.25">
</div>

<div class="field">
<label>Depth %</label>
<input type="number" step="0.01" id="depth" placeholder="Example: 61.5">
</div>

<div class="field">
<label>Table %</label>
<input type="number" step="0.01" id="table" placeholder="Example: 57">
</div>

<div class="field">
<label>Length X (mm)</label>
<input type="number" step="0.01" id="x" placeholder="Example: 6.9">
</div>

<div class="field">
<label>Width Y (mm)</label>
<input type="number" step="0.01" id="y" placeholder="Example: 6.8">
</div>

<div class="field">
<label>Depth Z (mm)</label>
<input type="number" step="0.01" id="z" placeholder="Example: 4.2">
</div>

</div>

<button onclick="predictPrice()">
💰 Predict Price
</button>

<div class="result" id="result">
Prediction will appear here
</div>

</div>
</div>

<script>
async function predictPrice(){

const data={
cut:document.getElementById("cut").value,
color:document.getElementById("color").value,
clarity:document.getElementById("clarity").value,
carat:parseFloat(document.getElementById("carat").value),
depth:parseFloat(document.getElementById("depth").value),
table:parseFloat(document.getElementById("table").value),
x:parseFloat(document.getElementById("x").value),
y:parseFloat(document.getElementById("y").value),
z:parseFloat(document.getElementById("z").value)
};

const response=await fetch("/predict_price",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const result=await response.json();

document.getElementById("result").innerHTML=
result.error ?
"❌ "+result.error :
"💰 Predicted Price: ₹ "+Number(result.predicted_price).toFixed(2);
}
</script>

</body>
</html>
