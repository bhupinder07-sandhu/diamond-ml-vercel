<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Price Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#050505,#121212,#1d1d1d);
min-height:100vh;
padding:30px;
color:white;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:#161616;
border:1px solid rgba(212,175,55,.15);
padding:40px;
border-radius:25px;
box-shadow:0 0 25px rgba(212,175,55,.1);
}

.back{
display:inline-block;
margin-bottom:25px;
text-decoration:none;
color:#d4af37;
font-weight:600;
}

h1{
text-align:center;
font-size:3rem;
color:#d4af37;
}

.gold-line{
width:120px;
height:4px;
background:#d4af37;
margin:15px auto 25px;
border-radius:50px;
}

.subtitle{
text-align:center;
color:#cfcfcf;
margin-bottom:25px;
}

.help-box{
background:#1f1f1f;
padding:18px;
border-left:4px solid #d4af37;
border-radius:12px;
margin-bottom:25px;
color:#ddd;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.field{
display:flex;
flex-direction:column;
}

label{
margin-bottom:8px;
font-weight:600;
color:#f7d774;
}

input,select{
padding:15px;
border-radius:12px;
border:1px solid #333;
background:#252525;
color:white;
font-size:15px;
outline:none;
}

input:focus,
select:focus{
border-color:#d4af37;
}

button{
width:100%;
margin-top:25px;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#d4af37,#f7d774);
color:black;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
background:#1f1f1f;
border-radius:15px;
text-align:center;
font-size:20px;
border:1px solid rgba(212,175,55,.15);
}

footer{
margin-top:40px;
padding-top:20px;
text-align:center;
color:#888;
border-top:1px solid rgba(212,175,55,.15);
}

@media(max-width:768px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<a href="/" class="back">⬅ Back Home</a>

<h1>💰 Diamond Price Prediction</h1>

<div class="gold-line"></div>

<p class="subtitle">
Luxury Diamond Valuation Powered By Artificial Intelligence
</p>

<div class="help-box">
💡 Sample Input<br><br>
Carat = 1.25<br>
Depth = 61.5<br>
Table = 57<br>
X = 6.9 mm<br>
Y = 6.8 mm<br>
Z = 4.2 mm
</div>

<div class="grid">

<div class="field">
<label>Diamond Cut</label>
<select id="cut">
<option>Ideal</option>
<option>Premium</option>
<option>Very Good</option>
<option>Good</option>
<option>Fair</option>
</select>
</div>

<div class="field">
<label>Diamond Color</label>
<select id="color">
<option>D</option>
<option>E</option>
<option>F</option>
<option>G</option>
<option>H</option>
<option>I</option>
<option>J</option>
</select>
</div>

<div class="field">
<label>Diamond Clarity</label>
<select id="clarity">
<option>IF</option>
<option>VVS1</option>
<option>VVS2</option>
<option>VS1</option>
<option>VS2</option>
<option>SI1</option>
<option>SI2</option>
<option>I1</option>
</select>
</div>

<div class="field">
<label>Carat Weight</label>
<input type="number" step="0.01" id="carat" placeholder="Example: 1.25">
</div>

<div class="field">
<label>Depth Percentage</label>
<input type="number" step="0.01" id="depth" placeholder="Example: 61.5">
</div>

<div class="field">
<label>Table Percentage</label>
<input type="number" step="0.01" id="table" placeholder="Example: 57">
</div>

<div class="field">
<label>Length X (mm)</label>
<input type="number" step="0.01" id="x" placeholder="Example: 6.9">
</div>

<div class="field">
<label>Width Y (mm)</label>
<input type="number" step="0.01" id="y" placeholder="Example: 6.8">
</div>

<div class="field">
<label>Depth Z (mm)</label>
<input type="number" step="0.01" id="z" placeholder="Example: 4.2">
</div>

</div>

<button onclick="predictPrice()">
💰 Predict Diamond Price
</button>

<div class="result" id="result">
Prediction will appear here
</div>

</div>

<footer>
💎 Diamond Prediction System<br>
Developed by Bhupinder Sandhu
</footer>

</div>

<script>
async function predictPrice(){

document.getElementById("result").innerHTML =
"⏳ Calculating Diamond Value...";

const data={
cut:document.getElementById("cut").value,
color:document.getElementById("color").value,
clarity:document.getElementById("clarity").value,
carat:parseFloat(document.getElementById("carat").value),
depth:parseFloat(document.getElementById("depth").value),
table:parseFloat(document.getElementById("table").value),
x:parseFloat(document.getElementById("x").value),
y:parseFloat(document.getElementById("y").value),
z:parseFloat(document.getElementById("z").value)
};

const response=await fetch("/predict_price",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

const result=await response.json();

document.getElementById("result").innerHTML=
result.error
? "❌ "+result.error
: "💰 Predicted Price: ₹ "+Number(result.predicted_price).toFixed(2);
}
</script>

</body>
</html>
